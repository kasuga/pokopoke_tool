<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ぽこあポケモン 好きな環境・好きなもの検索ツール</title>
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-D97JZTCSSJ"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());

    gtag('config', 'G-D97JZTCSSJ');
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Outfit:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <div class="container">
    <h1>ぽこあポケモン 検索ツール</h1>

    <div class="controls">
      <div class="filter-group">
        <label for="searchName">🔍 ポケモン名で検索</label>
        <input type="text" id="searchName" placeholder="例: ピカチュウ">
      </div>
      <div class="filter-group">
        <label for="filterEnv">🌲 好きな環境で絞り込み</label>
        <select id="filterEnv">
          <option value="">すべて</option>
        </select>
      </div>
      <div class="filter-group multi-filter-group">
        <label>🪑 好きなもので絞り込み (AND検索)</label>
        <div id="favFilterContainer" class="fav-filter-container">
          <div class="fav-filter-row">
            <select class="filter-fav">
              <option value="">すべて</option>
            </select>
          </div>
        </div>
        <button type="button" id="addFavFilter" class="add-filter-btn">＋ 別の条件を追加</button>
      </div>
    </div>

    <div id="pokemonGrid" class="pokemon-grid">
      <!-- カードがここに動的に生成されます -->
    </div>

    <div id="pagination" class="pagination"></div>

    <footer class="site-footer">
      <p>本ツールは個人による非公式のファンプロジェクトであり、株式会社ポケモン、任天堂、その他の権利元とは一切関係ありません。使用されているデータの著作権はそれぞれの権利元に帰属します。</p>
    </footer>
  </div>

  <script src="script.js"></script>
</body>

</html>
